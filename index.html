<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">    <title>Daily Preventive Autogate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = {theme: {extend: {colors: {primary: '#eb3c21', primary_hover: '#cf331b', primary_light: '#fcece9'}}}}</script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
    
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased h-screen overflow-hidden flex flex-col selection:bg-primary_light selection:text-primary">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/95 z-50 flex flex-col justify-center items-center backdrop-blur-sm">
        <div class="loader mb-4"></div>
        <h2 class="text-slate-700 font-semibold tracking-wide" id="loadingText">Menyiapkan Sistem...</h2>
    </div>

    <div id="view-login" class="hidden flex-1 flex flex-col justify-center items-center p-6 bg-primary">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 text-center">
            <div class="w-20 h-20 bg-primary_light text-primary rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 mb-1">Preventive App</h1>
            <p class="text-sm text-slate-500 mb-8 font-medium">Autogate System</p>
            <div class="text-left mb-6">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Identitas Officer</label>
                <select id="select-officer" class="w-full border-2 border-slate-200 rounded-2xl p-4 outline-none focus:border-primary bg-slate-50 text-center font-semibold text-slate-700 appearance-none">
                    <option value="">-- Pilih Nama Petugas --</option>
                </select>
            </div>
            <button onclick="loginUser()" class="w-full bg-primary hover:bg-primary_hover text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-primary/30 active:scale-95 transition-all">Masuk ke Sistem</button>
        </div>
    </div>

    <div id="view-main" class="hidden flex-1 flex flex-col h-full relative bg-slate-50">
        <header class="bg-white shadow-sm border-b border-slate-200 px-5 py-4 flex justify-between items-center z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-md">PA</div>
                <div>
                    <h1 class="font-bold text-[15px] text-slate-800 leading-tight">Daily Preventive</h1>
                    <p id="user-greeting" class="text-[11px] font-medium text-slate-500">Halo, Officer</p>
                </div>
            </div>
            <button onclick="logoutUser()" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-full font-bold transition-colors">Keluar</button>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-28" id="main-content">
            
            <section id="tab-dashboard" class="block max-w-lg mx-auto">
                <div class="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm mb-5">
                    <label class="block text-sm font-bold text-slate-700 mb-3">Area Pengecekan</label>
                    <select id="select-gate" onchange="loadGateStatus()" class="w-full border-2 border-slate-200 rounded-xl p-3 outline-none focus:border-primary font-medium text-slate-700 mb-4 transition-all">
                        <option value="">-- Pilih Lokasi Gate --</option>
                    </select>

                    <a href="https://docs.google.com/spreadsheets/d/1t9F2CBeqXQYrViaSnO_6BK8tnpwhRDerfvAUPIY-Ydk/edit?pli=1&gid=999432491#gid=999432491" 
                    target="_blank" 
                    class="inline-flex items-center gap-2 text-[11px] font-bold text-slate-400 hover:text-primary mb-4 transition-colors uppercase tracking-widest border-b border-dashed border-slate-300 pb-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        Buka Database Sheets
                    </a>

                    <button onclick="switchTab('checker')" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        Mulai Daily Check
                    </button>
                </div>

                <div id="gate-status-panel" class="hidden">
                    <div class="flex items-center justify-between mb-3 px-1">
                        <h3 class="font-bold text-slate-800 text-sm">Riwayat Masalah Terakhir</h3>
                        <span id="active-gate-badge" class="bg-primary_light text-primary text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wide"></span>
                    </div>
                    <div id="status-list" class="space-y-3"></div>
                </div>
            </section>

            <section id="tab-checker" class="hidden max-w-lg mx-auto">
                <div class="bg-primary_light border border-primary/20 rounded-xl p-3 mb-5 flex items-center gap-3">
                    <div class="bg-white p-2 rounded-lg text-primary shadow-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg></div>
                    <div>
                        <p class="text-[10px] text-primary font-bold uppercase tracking-wider">Mode Pengecekan Menyeluruh</p>
                        <p id="active-gate-text-checker" class="text-sm font-bold text-slate-800">Pilih gate di Dashboard</p>
                    </div>
                </div>

                <form id="form-checker" onsubmit="submitForm(event, 'daily')">
                    <div id="dynamic-form-container" class="space-y-5 mb-6"></div>

                    <div class="bg-white rounded-2xl border border-slate-200 p-5 mb-6 shadow-sm">
                        <h3 class="font-bold text-slate-800 border-b border-slate-100 pb-3 mb-4 flex items-center gap-2">Informasi Tambahan</h3>
                        <div class="mb-5">
                            <label class="block text-xs font-bold text-slate-600 mb-2">Keterangan Khusus</label>
                            <textarea id="input-keterangan" rows="3" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm focus:border-primary outline-none bg-slate-50" placeholder="Tulis catatan jika ada alat bermasalah..."></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-2">Dokumentasi Foto</label>
                            <div id="photo-list-container" class="space-y-2 mb-3 empty:hidden"></div>
                            <input type="file" id="hidden-photo-input" accept="image/*" class="hidden" onchange="handlePhotoSelection(event)">
                            
                            <button type="button" onclick="triggerPhotoInput()" class="w-full flex items-center justify-center gap-2 border-2 border-dashed border-slate-300 bg-slate-50 text-slate-600 hover:text-primary hover:border-primary hover:bg-primary_light font-bold py-3.5 rounded-xl text-sm transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Tambah Foto
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-primary hover:bg-primary_hover text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 text-lg flex justify-center items-center gap-2 mb-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Submit Daily Check
                    </button>
                </form>
            </section>

            <section id="tab-maintenance" class="hidden max-w-lg mx-auto">
                <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-5 flex items-center gap-3">
                    <div class="bg-white p-2 rounded-lg text-blue-600 shadow-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></div>
                    <div>
                        <p class="text-[10px] text-blue-700 font-bold uppercase tracking-wider">Update Perbaikan / Insidental</p>
                        <p id="active-gate-text-maint" class="text-sm font-bold text-slate-800">Pilih gate di Dashboard</p>
                    </div>
                </div>

                <form id="form-maintenance" onsubmit="submitForm(event, 'maintenance')">
                    <div class="bg-white rounded-2xl border border-slate-200 p-5 mb-5 shadow-sm">
                        <label class="block text-xs font-bold text-slate-600 mb-2">Pilih Alat (Opsional)</label>
                        <select id="maint-komponen" class="w-full border-2 border-slate-200 rounded-xl p-3 outline-none focus:border-blue-500 font-medium text-slate-700 mb-4 bg-slate-50">
                            </select>

                        <label class="block text-xs font-bold text-slate-600 mb-2">Update Status Alat (Opsional)</label>
                        <select id="maint-status" class="w-full border-2 border-slate-200 rounded-xl p-3 outline-none focus:border-blue-500 font-medium text-slate-700 mb-2 bg-slate-50">
                            <option value="">-- Tetap / Hanya Catatan --</option>
                            <option value="Normal">🟢 Normal (Sudah Diperbaiki)</option>
                            <option value="Peringatan">🟡 Peringatan / Warning</option>
                            <option value="Rusak/Error">🔴 Rusak / Error</option>
                        </select>
                    </div>

<div class="bg-white rounded-2xl border border-slate-200 p-5 mb-6 shadow-sm">
    <label class="block text-xs font-bold text-slate-600 mb-2 uppercase tracking-wider">Jurnal / Keterangan Pekerjaan</label>
    <textarea id="maint-keterangan" rows="3" required 
        class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm focus:border-blue-500 outline-none bg-slate-50 mb-4 transition-all" 
        placeholder="Misal: Sudah dilakukan pergantian kabel LPR, sekarang alat normal..."></textarea>
    
    <label class="block text-xs font-bold text-slate-600 mb-2 uppercase tracking-wider">Dokumentasi Perbaikan</label>
    
    <div id="maint-photo-list" class="space-y-2 mb-3 empty:hidden"></div>
    
<input type="file" id="maint-hidden-photo" 
    accept="image/jpeg, image/png" 
    capture="environment" 
    multiple 
    class="hidden" 
    onchange="handlePhotoSelection(event, 'maintenance')">
            
    <button type="button" 
        onclick="document.getElementById('maint-hidden-photo').click()" 
        class="w-full flex flex-col items-center justify-center gap-1 border-2 border-dashed border-slate-300 bg-slate-50 text-slate-500 hover:text-blue-600 hover:border-blue-500 hover:bg-blue-50 py-4 rounded-xl transition-all group">
        
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6 text-slate-400 group-hover:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span class="font-bold text-sm">Ambil Foto / Galeri</span>
        </div>
        <span class="text-[10px] text-slate-400 italic">Mendukung kamera langsung & watermark otomatis</span>
    </button>
</div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 text-lg flex justify-center items-center gap-2 mb-2 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg> Post Jurnal
                    </button>
                </form>
            </section>
        </main>

        <button onclick="showHelp()" class="fixed bottom-24 right-5 bg-primary text-white p-3.5 rounded-full shadow-xl shadow-primary/30 z-30 hover:scale-110 active:scale-95 transition-all flex items-center justify-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>

        <nav class="bg-white border-t border-slate-200 fixed bottom-0 w-full flex justify-around items-center pb-safe z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="flex-1 py-3 pt-4 flex flex-col items-center text-primary transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="text-[10px] font-bold">Dashboard</span>
            </button>
            <button onclick="switchTab('checker')" id="nav-checker" class="flex-1 py-3 pt-4 flex flex-col items-center text-slate-400 hover:text-primary transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <span class="text-[10px] font-bold">Daily Check</span>
            </button>
            <button onclick="switchTab('maintenance')" id="nav-maintenance" class="flex-1 py-3 pt-4 flex flex-col items-center text-slate-400 hover:text-blue-600 transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="text-[10px] font-bold">Jurnal</span>
            </button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
