<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Preventive Autogate</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        primary: '#eb3c21',
                        primary_hover: '#cf331b',
                        primary_light: '#fcece9'
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans antialiased h-screen overflow-hidden flex flex-col selection:bg-primary_light selection:text-primary transition-colors duration-300">

    <div id="loadingOverlay"
        class="fixed inset-0 bg-white/95 dark:bg-slate-900/95 z-50 flex flex-col justify-center items-center backdrop-blur-sm transition-all duration-300">
        <div class="loader mb-4"></div>
        <h2 class="text-slate-700 dark:text-slate-200 font-semibold tracking-wide" id="loadingText">Menyiapkan Sistem...</h2>
    </div>

    <div id="view-login" class="hidden flex-1 flex flex-col justify-center items-center p-6 bg-primary dark:bg-slate-950">
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl shadow-2xl p-8 text-center transition-colors duration-300">
            <div
                class="w-20 h-20 bg-primary_light dark:bg-primary/20 text-primary rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 dark:text-white mb-1">Preventive App</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-8 font-medium">Autogate System</p>
            <div class="text-left mb-6">
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">Identitas
                    Officer</label>
                <select id="select-officer" aria-label="Pilih Officer"
                    class="w-full border-2 border-slate-200 dark:border-slate-700 rounded-2xl p-4 outline-none focus:border-primary dark:focus:border-primary bg-slate-50 dark:bg-slate-900 text-center font-semibold text-slate-700 dark:text-slate-200 appearance-none transition-colors duration-300">
                    <option value="">-- Pilih Nama Petugas --</option>
                </select>
            </div>
            <button onclick="loginUser()"
                class="w-full bg-primary hover:bg-primary_hover text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-primary/30 active:scale-95 transition-transform duration-150">Masuk
                ke Sistem</button>
        </div>
    </div>

    <div id="view-main" class="hidden flex-1 flex flex-col h-full relative bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
        <header
            class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 px-5 py-4 flex justify-between items-center z-10 sticky top-0 transition-colors duration-300">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-md">
                    PA</div>
                <div>
                    <h1 class="font-bold text-[15px] text-slate-800 dark:text-white leading-tight">Daily Preventive</h1>
                    <p id="user-greeting" class="text-[11px] font-medium text-slate-500 dark:text-slate-400">Halo, Officer</p>
                </div>
            </div>
            <button onclick="logoutUser()" aria-label="Keluar dari sistem"
                class="text-xs bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/50 text-red-600 dark:text-red-400 px-4 py-2 rounded-full font-bold transition-colors">Keluar</button>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-28" id="main-content">

            <section id="tab-dashboard" class="block max-w-lg mx-auto">
                <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-2xl shadow-sm mb-5 transition-colors duration-300">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">Area Pengecekan</label>
                    <select id="select-gate" onchange="loadGateStatus()" aria-label="Pilih Lokasi Gate"
                        class="w-full border-2 border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:border-primary dark:focus:border-primary font-medium text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-900 mb-4 transition-all">
                        <option value="">-- Pilih Lokasi Gate --</option>
                    </select>

                    <button onclick="switchTab('checker')"
                        class="w-full bg-slate-800 dark:bg-slate-700 hover:bg-slate-900 dark:hover:bg-slate-600 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform duration-150 flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                            </path>
                        </svg>
                        Mulai Daily Check
                    </button>
                </div>

                <div id="gate-status-panel" class="hidden">
                    <div class="flex items-center justify-between mb-3 px-1">
                        <h3 class="font-bold text-slate-800 dark:text-slate-200 text-sm">Riwayat Masalah Terakhir</h3>
                        <span id="active-gate-badge"
                            class="bg-primary_light dark:bg-primary/20 text-primary dark:text-primary-light text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wide"></span>
                    </div>
                    <div id="status-list" class="space-y-3">
                        <!-- Content -->
                    </div>
                </div>
            </section>

            <section id="tab-checker" class="hidden max-w-lg mx-auto">
                <div class="bg-primary_light dark:bg-primary/10 border border-primary/20 dark:border-primary/30 rounded-xl p-3 mb-5 flex items-center gap-3 transition-colors duration-300">
                    <div class="bg-white dark:bg-slate-800 p-2 rounded-lg text-primary shadow-sm"><svg class="w-5 h-5" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                            </path>
                        </svg></div>
                    <div>
                        <p class="text-[10px] text-primary dark:text-primary-light font-bold uppercase tracking-wider">Mode Pengecekan
                            Menyeluruh</p>
                        <p id="active-gate-text-checker" class="text-sm font-bold text-slate-800 dark:text-slate-200">Pilih gate di
                            Dashboard</p>
                    </div>
                </div>

                <form id="form-checker" onsubmit="submitForm(event, 'daily')">
                    <div id="dynamic-form-container" class="space-y-5 mb-6"></div>

                    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-5 mb-6 shadow-sm transition-colors duration-300">
                        <h3 class="font-bold text-slate-800 dark:text-slate-200 border-b border-slate-100 dark:border-slate-700 pb-3 mb-4">Informasi Tambahan</h3>

                        <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2 uppercase tracking-wider">Keterangan
                            Khusus</label>
                        <textarea id="input-keterangan" rows="3" aria-label="Keterangan Khusus"
                            class="w-full border-2 border-slate-100 dark:border-slate-700 rounded-xl p-3 text-sm focus:border-primary dark:focus:border-primary outline-none bg-slate-50 dark:bg-slate-900 dark:text-white mb-5 transition-colors duration-300"
                            placeholder="Tulis catatan jika ada alat bermasalah..."></textarea>

                        <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2 uppercase tracking-wider">Dokumentasi
                            Foto</label>
                        <div id="photo-list-container" class="space-y-2 mb-4 empty:hidden"></div>

                        <div class="grid grid-cols-2 gap-3">
                            <button type="button" onclick="openCameraModal('daily')" aria-label="Buka Kamera"
                                class="flex flex-col items-center justify-center gap-1 border-2 border-primary/20 dark:border-primary/30 bg-primary_light dark:bg-primary/10 text-primary py-3 rounded-xl active:scale-95 transition-transform duration-150">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
                                    </path>
                                </svg>
                                <span class="text-[10px] font-bold uppercase">Kamera</span>
                            </button>
                            <button type="button" onclick="document.getElementById('daily-gallery-input').click()" aria-label="Buka Galeri"
                                class="flex flex-col items-center justify-center gap-1 border-2 border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 py-3 rounded-xl active:scale-95 transition-transform duration-150">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                                    </path>
                                </svg>
                                <span class="text-[10px] font-bold uppercase">Galeri</span>
                            </button>
                        </div>
                        <input type="file" id="daily-gallery-input" accept="image/*" multiple class="hidden"
                            onchange="handlePhotoSelection(event, 'daily')">
                    </div>

                    <button type="submit" id="btn-submit-daily"
                        class="w-full bg-primary hover:bg-primary_hover text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform duration-150 text-lg flex justify-center items-center gap-2 mb-2">
                        <span class="flex items-center gap-2" id="btn-submit-daily-text">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7">
                                </path>
                            </svg> Submit Daily Check
                        </span>
                        <div class="loader-btn hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" id="btn-submit-daily-loader"></div>
                    </button>
                </form>
            </section>

            <section id="tab-maintenance" class="hidden max-w-lg mx-auto">
                <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/50 rounded-xl p-3 mb-5 flex items-center gap-3 transition-colors duration-300">
                    <div class="bg-white dark:bg-slate-800 p-2 rounded-lg text-blue-600 dark:text-blue-400 shadow-sm"><svg class="w-5 h-5" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg></div>
                    <div>
                        <p class="text-[10px] text-blue-700 dark:text-blue-300 font-bold uppercase tracking-wider">Update Perbaikan /
                            Insidental</p>
                        <p id="active-gate-text-maint" class="text-sm font-bold text-slate-800 dark:text-slate-200">Pilih gate di Dashboard
                        </p>
                    </div>
                </div>

                <form id="form-maintenance" onsubmit="submitForm(event, 'maintenance')">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-5 mb-5 shadow-sm transition-colors duration-300">
                        <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2 uppercase tracking-wider">Pilih Alat
                            (Opsional)</label>
                        <select id="maint-komponen" aria-label="Pilih Komponen Maintenance"
                            class="w-full border-2 border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:border-blue-500 font-medium text-slate-700 dark:text-slate-200 mb-4 bg-slate-50 dark:bg-slate-900 transition-colors duration-300"></select>

                        <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2 uppercase tracking-wider">Update
                            Status Alat</label>
                        <select id="maint-status" aria-label="Update Status Alat"
                            class="w-full border-2 border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:border-blue-500 font-medium text-slate-700 dark:text-slate-200 bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
                            <option value="">-- Tetap / Hanya Catatan --</option>
                            <option value="Normal">🟢 Normal (Sudah Diperbaiki)</option>
                            <option value="Peringatan">🟡 Peringatan / Warning</option>
                            <option value="Rusak/Error">🔴 Rusak / Error</option>
                        </select>
                    </div>

                    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-5 mb-6 shadow-sm transition-colors duration-300">
                        <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2 uppercase tracking-wider">Jurnal /
                            Keterangan Pekerjaan</label>
                        <textarea id="maint-keterangan" rows="3" required aria-label="Jurnal Pekerjaan"
                            class="w-full border-2 border-slate-100 dark:border-slate-700 rounded-xl p-3 text-sm focus:border-blue-500 outline-none bg-slate-50 dark:bg-slate-900 dark:text-white mb-5 transition-colors duration-300"
                            placeholder="Misal: Sudah dilakukan pergantian kabel LPR..."></textarea>

                        <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2 uppercase tracking-wider">Dokumentasi
                            Perbaikan</label>
                        <div id="maint-photo-list" class="space-y-2 mb-4 empty:hidden"></div>

                        <div class="grid grid-cols-2 gap-3">
                            <button type="button" onclick="openCameraModal('maintenance')" aria-label="Buka Kamera Maintenance"
                                class="flex flex-col items-center justify-center gap-1 border-2 border-blue-100 dark:border-blue-800/50 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 py-3 rounded-xl active:scale-95 transition-transform duration-150">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
                                    </path>
                                </svg>
                                <span class="text-[10px] font-bold uppercase">Kamera</span>
                            </button>
                            <button type="button" onclick="document.getElementById('maint-gallery-input').click()" aria-label="Buka Galeri Maintenance"
                                class="flex flex-col items-center justify-center gap-1 border-2 border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400 py-3 rounded-xl active:scale-95 transition-transform duration-150">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                                    </path>
                                </svg>
                                <span class="text-[10px] font-bold uppercase">Galeri</span>
                            </button>
                        </div>
                        <input type="file" id="maint-gallery-input" accept="image/*" multiple class="hidden"
                            onchange="handlePhotoSelection(event, 'maintenance')">
                    </div>


                    <button type="submit" id="btn-submit-maint"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform duration-150 text-lg flex justify-center items-center gap-2 mb-2 transition-colors">
                        <span class="flex items-center gap-2" id="btn-submit-maint-text">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4">
                                </path>
                            </svg> Post Jurnal
                        </span>
                        <div class="loader-btn hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" id="btn-submit-maint-loader"></div>
                    </button>
                </form>
            </section>
        </main>

        <nav
            class="bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 fixed bottom-0 w-full flex justify-around items-center pb-safe z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] transition-colors duration-300">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" aria-label="Tab Dashboard"
                class="flex-1 py-3 pt-4 flex flex-col items-center text-primary transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                    </path>
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Dashboard</span>
            </button>
            <button onclick="switchTab('checker')" id="nav-checker" aria-label="Tab Daily Check"
                class="flex-1 py-3 pt-4 flex flex-col items-center text-slate-400 dark:text-slate-500 transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                    </path>
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Daily Check</span>
            </button>
            <button onclick="switchTab('maintenance')" id="nav-maintenance" aria-label="Tab Jurnal"
                class="flex-1 py-3 pt-4 flex flex-col items-center text-slate-400 dark:text-slate-500 transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Jurnal</span>
            </button>
        </nav>
    </div>

    <div id="camera-modal" class="fixed inset-0 z-[999] hidden bg-black flex flex-col items-center justify-between">
        <div class="w-full p-4 flex justify-between items-center text-white bg-black/50 backdrop-blur-md z-10">
            <button onclick="closeCameraModal()" aria-label="Tutup Kamera" class="p-2 bg-white/10 rounded-full active:bg-white/20 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
            <span class="text-xs font-bold uppercase tracking-widest">Kamera Autogate</span>
            <div class="flex gap-2">
                <button onclick="toggleFlash()" id="flash-btn" aria-label="Toggle Flash" class="hidden p-2 bg-white/10 rounded-full active:bg-white/20 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <!-- Lightning Icon -->
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </button>
                <button onclick="switchCamera()" aria-label="Ganti Kamera" class="p-2 bg-white/10 rounded-full active:bg-white/20 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <!-- Switch Camera Icon -->
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="relative flex-1 w-full flex items-center justify-center overflow-hidden bg-slate-900">
            <video id="camera-stream" autoplay playsinline class="w-full h-full object-cover"></video>
            <div
                class="absolute inset-0 border-[30px] border-black/40 pointer-events-none flex items-center justify-center">
                <div class="w-full h-64 border-2 border-white/30 rounded-3xl"></div>
            </div>
        </div>

        <div class="w-full p-10 flex justify-center bg-black/50 backdrop-blur-md z-10">
            <button id="shutter-btn" aria-label="Ambil Foto"
                class="w-20 h-20 bg-white rounded-full border-[6px] border-slate-400 active:scale-90 transition-transform duration-150 shadow-2xl flex items-center justify-center">
                <div class="w-14 h-14 rounded-full border-2 border-slate-900"></div>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
</body>

</html>
